name: CI Pipeline

on: [push, pull_request] # Runs whenever you push code

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ruff pytest

      - name: Run Linting
        run: ruff check .

      - name: Run Tests
        run: pytest
